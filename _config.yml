# =============================================================================
# Site settings — minimal config for a static HTML page (no Jekyll theme)
# =============================================================================
# This site is now a single hand-written index.html.
# Jekyll only needs to (a) serve files as-is and (b) skip themes.

title:       Dae-Kwan Ko
description: Ph.D. student at Dongguk University. Robotics, AI, and human–robot interaction forces.
author:      Ko Dae-Kwan
url:         https://kodaekwan.github.io

# Disable the previous remote theme. The page is now pure HTML/CSS.
# remote_theme:

plugins:
  - jekyll-seo-tag

# Files / folders Jekyll should NOT publish
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - lib/
  - scripts/
  - _sass/
  - _includes/
  - _layouts/
  - _test/
  - assets/js/
  - assets/main.scss
  - docker-compose.yml
  - Procfile
  - app.json
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - LICENSE
  - modern-resume-theme.gemspec
  - screenshot.png
